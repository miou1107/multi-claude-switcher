name: Verify HOMEBREW_TAP_TOKEN

# One-off workflow to prove the HOMEBREW_TAP_TOKEN secret has the read AND
# write access the release automation needs on miou1107/homebrew-tap. Delete
# this file once the run has succeeded.
#
# Trigger it manually:
#   gh workflow run verify-tap-token.yml --repo miou1107/multi-claude-switcher

on:
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew tap (proves read access)
        uses: actions/checkout@v4
        with:
          repository: miou1107/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Push an empty commit (proves write access)
        run: |
          set -euo pipefail
          cd tap
          git config user.name  "Vin"
          git config user.email "vincent@fontrip.com"
          git commit --allow-empty -m "chore: verify HOMEBREW_TAP_TOKEN push access"
          git push

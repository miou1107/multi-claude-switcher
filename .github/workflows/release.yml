name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.6.1 && git push origin v0.6.1
# macOS: builds a universal (arm64 + Intel) tray binary with the version baked in,
# packages it into Multi-Claude Switcher.app, and attaches that _macos.zip.
# Windows: builds mcs-tray.exe + mcs.exe (pure Go, no CGO) and attaches a
# _windows.zip. Each OS's zip is that platform's sole download and the
# self-updater's source (it extracts the tray binary from the zip).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal tray binary
        env:
          LDFLAGS: "-X github.com/miou1107/multi-claude-switcher/core.Version=${{ steps.ver.outputs.version }}"
        run: |
          set -euxo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOARCH=arm64 CC="clang -arch arm64" \
            go build -ldflags "$LDFLAGS" -o "dist/mcs-tray-arm64" ./cmd/mcs-tray
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" \
            go build -ldflags "$LDFLAGS" -o "dist/mcs-tray-amd64" ./cmd/mcs-tray
          lipo -create -output "dist/mcs-tray-macos-universal" \
            "dist/mcs-tray-arm64" "dist/mcs-tray-amd64"
          rm "dist/mcs-tray-arm64" "dist/mcs-tray-amd64"
          file "dist/mcs-tray-macos-universal"

      - name: Package .app bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          # Reuse the universal binary already built above instead of rebuilding.
          ./scripts/package-app.sh "$VERSION" dist/mcs-tray-macos-universal
          ls -la dist

      - name: Publish GitHub Release
        # Only the packaged .app is published. It is the sole download and the
        # self-updater's source (it extracts the tray binary from this zip).
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Multi-Claude-Switcher_*_macos.zip
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}'.TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows binaries
        shell: pwsh
        # systray is pure-Go on Windows, so no C toolchain / CGO is needed.
        env:
          CGO_ENABLED: '0'
          LDFLAGS: '-X github.com/miou1107/multi-claude-switcher/core.Version=${{ steps.ver.outputs.version }}'
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -ldflags "$env:LDFLAGS" -o dist/mcs-tray.exe ./cmd/mcs-tray
          go build -ldflags "$env:LDFLAGS" -o dist/mcs.exe ./cmd/mcs

      - name: Package Windows zip
        shell: pwsh
        # The zip must contain mcs-tray.exe: the self-updater extracts it from here.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          $zip = "dist/Multi-Claude-Switcher_$($env:VERSION)_windows.zip"
          Compress-Archive -Path dist/mcs-tray.exe, dist/mcs.exe -DestinationPath $zip -Force
          Get-ChildItem dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Multi-Claude-Switcher_*_windows.zip
          generate_release_notes: true

name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.6.1 && git push origin v0.6.1
# macOS: builds a universal (arm64 + Intel) tray binary with the version baked in,
# packages it into Multi-Claude Switcher.app, and attaches that _macos.zip (the
# sole macOS download and the macOS self-updater's source).
# Windows: builds mcs-tray.exe (pure Go, no CGO) and attaches a single
# _windows_setup.exe installer. Upgrades run the newer installer, which replaces
# the running exe in place, so there is no separate self-update zip.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      # Expose the mac zip's SHA256 so the update-homebrew-tap job can pin it in
      # the cask without re-downloading the artifact.
      sha256: ${{ steps.sha.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build universal tray binary
        env:
          LDFLAGS: "-X github.com/miou1107/multi-claude-switcher/core.Version=${{ steps.ver.outputs.version }}"
        run: |
          set -euxo pipefail
          mkdir -p dist
          CGO_ENABLED=1 GOARCH=arm64 CC="clang -arch arm64" \
            go build -ldflags "$LDFLAGS" -o "dist/mcs-tray-arm64" ./cmd/mcs-tray
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" \
            go build -ldflags "$LDFLAGS" -o "dist/mcs-tray-amd64" ./cmd/mcs-tray
          lipo -create -output "dist/mcs-tray-macos-universal" \
            "dist/mcs-tray-arm64" "dist/mcs-tray-amd64"
          rm "dist/mcs-tray-arm64" "dist/mcs-tray-amd64"
          file "dist/mcs-tray-macos-universal"

      - name: Package .app bundle
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          # Reuse the universal binary already built above instead of rebuilding.
          ./scripts/package-app.sh "$VERSION" dist/mcs-tray-macos-universal
          ls -la dist

      - name: Compute macOS zip SHA256
        id: sha
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euxo pipefail
          sha=$(shasum -a 256 "dist/Multi-Claude-Switcher_${VERSION}_macos.zip" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "macOS zip SHA256: $sha"

      - name: Publish GitHub Release
        # Only the packaged .app is published. It is the sole download and the
        # self-updater's source (it extracts the tray binary from this zip).
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Multi-Claude-Switcher_*_macos.zip
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.ref_name }}'.TrimStart('v')
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Windows tray binary
        shell: pwsh
        # systray is pure-Go on Windows, so no C toolchain / CGO is needed.
        # -H=windowsgui makes it a GUI-subsystem exe, so it runs from the tray
        # with no console window. The exe's file icon comes from a committed
        # Windows resource (cmd/mcs-tray/rsrc_windows_amd64.syso), linked
        # automatically. Only the tray app ships (CLI omitted, matching macOS).
        env:
          CGO_ENABLED: '0'
          LDFLAGS: '-H=windowsgui -X github.com/miou1107/multi-claude-switcher/core.Version=${{ steps.ver.outputs.version }}'
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -ldflags "$env:LDFLAGS" -o dist/mcs-tray.exe ./cmd/mcs-tray

      - name: Build Windows installer (Inno Setup)
        shell: pwsh
        # A proper Setup.exe is the sole Windows download: per-user install, Start
        # Menu shortcut, uninstaller. Upgrades run the newer installer, which
        # replaces the running exe in place — so no separate self-update zip.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Qp "/DMyAppVersion=$($env:VERSION)" packaging\windows-setup.iss
          Get-ChildItem dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Multi-Claude-Switcher_*_windows_setup.exe
          generate_release_notes: true

  # Bump the multi-claude-switcher cask in miou1107/homebrew-tap so
  # `brew install --cask miou1107/tap/multi-claude-switcher` picks up the new
  # release automatically. Requires a fine-grained PAT with Contents:read/write
  # on that tap repo, stored as the HOMEBREW_TAP_TOKEN secret on THIS repo.
  # Runs after the mac build so the zip SHA256 (a job output) is available.
  # A soft dependency: if this job fails (missing token, tap edit error), the
  # mac and windows releases have already been published successfully.
  update-homebrew-tap:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: miou1107/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update cask (version + sha256)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ needs.build-macos.outputs.sha256 }}
        run: |
          set -euxo pipefail
          cd tap
          # Anchor on the two-space cask indentation so future top-level fields
          # named "version" or "sha256" inside blocks (e.g. livecheck) are not
          # accidentally rewritten.
          sed -i \
            -e "s|^  version \".*\"|  version \"$VERSION\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"$SHA256\"|" \
            Casks/multi-claude-switcher.rb
          git diff Casks/multi-claude-switcher.rb

      - name: Commit and push
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet Casks/multi-claude-switcher.rb; then
            echo "No changes to cask (already at v$VERSION with the same SHA256); skipping."
            exit 0
          fi
          git config user.name  "Vin"
          git config user.email "vincent@fontrip.com"
          git add Casks/multi-claude-switcher.rb
          git commit -m "Bump multi-claude-switcher cask to v$VERSION"
          git push
